name: CI

# Runs the test suite, the linter and the type checker on every push and pull
# request. The test matrix includes Windows and macOS because the package is
# published as "OS Independent" — path handling in particular has regressed on
# Windows before (see #26), and a Linux-only matrix would not have caught it.

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: these jobs only need to read the repository.
permissions: {}

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read   # checkout
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # 3.10 is the floor declared in pyproject. 3.12 is the ceiling until
        # pydub stops importing audioop, which was removed in 3.13.
        python-version: ['3.10', '3.12']
    steps:
      # Third-party actions are pinned to full commit SHAs (immutable), as in
      # the publish workflow.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Install dependencies
        run: uv pip install --system -r requirements.txt
      # The tests mock every network and filesystem call, so no server,
      # credentials or ffmpeg install is needed here.
      - name: Run tests
        run: pytest

  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Install dependencies
        run: uv pip install --system -r requirements.txt
      - name: Ruff
        run: ruff check src test
      - name: Mypy
        run: mypy src
