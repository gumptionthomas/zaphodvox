name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published, using PyPI Trusted
# Publishing (OIDC) — no API token is stored anywhere. Bump `__version__` in
# src/zaphodvox/__init__.py and commit before creating the release; PyPI
# rejects re-uploading an existing version.

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/zaphodvox
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist and wheel
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        run: uv publish --trusted-publishing always
