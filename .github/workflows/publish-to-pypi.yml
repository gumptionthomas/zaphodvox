name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published, using PyPI Trusted
# Publishing (OIDC) — no API token is stored anywhere. Bump `__version__` in
# src/zaphodvox/__init__.py and commit before creating the release; PyPI
# rejects re-uploading an existing version.

on:
  release:
    types: [published]

# Least privilege by default; the publish job elevates only what it needs.
permissions: {}

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/zaphodvox
    permissions:
      contents: read   # checkout
      id-token: write  # Trusted Publishing (OIDC)
    steps:
      # Third-party actions are pinned to full commit SHAs (immutable) since
      # this workflow can publish releases to PyPI.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Build sdist and wheel
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        run: uv publish --trusted-publishing always
